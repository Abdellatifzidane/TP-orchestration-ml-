# Stack de classification conteneurisee (inspiree de todo/docker-compose.yml,
# adaptee a la structure plate src/ ; pas de frontend dans ce projet).
#
# Services :
#   - mlflow : serveur de suivi (UI + Model Registry) sur :5000
#   - train  : entrainement one-shot (profil "train"), ecrit le modele dans le
#              volume partage models_data
#   - api    : API FastAPI d'inference sur :8000, lit le modele en lecture seule
#
# Sequence typique (depuis la racine du projet) :
#   docker compose up -d --build mlflow            # 1. serveur de suivi
#   docker compose --profile train run --rm train  # 2. entrainement -> modele
#   docker compose up -d --build api               # 3. API (recharge le modele au demarrage)
#   -> API http://localhost:8000/docs , MLflow http://localhost:5000

services:
  mlflow:
    # Reutilise l'image du projet (mlflow y est deja installe via uv) : version
    # coherente avec pyproject, pas de dependance a un tag d'image externe.
    build:
      context: .
      dockerfile: docker/Dockerfile.train
    image: mlops-train
    environment:
      # MLflow 3.x : autorise les Origin headers (CORS/CSRF de fastapi_security).
      # Sinon l'UI elle-meme est bloquee avec des "Blocked cross-origin request".
      MLFLOW_ALLOWED_ORIGINS: "*"
      MLFLOW_SERVER_ALLOWED_ORIGINS: "*"
    command: >
      mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
      --allowed-hosts "*"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

  train:
    build:
      context: .
      dockerfile: docker/Dockerfile.train
    image: mlops-train
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      - mlflow
    volumes:
      - models_data:/app/models
    # Profil "train" : service one-shot, ne demarre pas avec un simple `up`.
    profiles:
      - train

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: mlops-api
    ports:
      - "8000:8000"
    volumes:
      - models_data:/app/models:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    image: mlops-frontend
    environment:
      # API_URL : appel HTTP interne (le frontend resout `api` via le reseau Docker).
      API_URL: http://api:8000
      # API_PUBLIC_URL / MLFLOW_URL : liens cliquables, vus par le navigateur de
      # l'utilisateur. Definir PUBLIC_HOST avant `docker compose up` :
      #   export PUBLIC_HOST=141.253.114.132   # IP publique du VPS
      # Sinon, fallback `localhost` (OK en developpement local).
      API_PUBLIC_URL: http://${PUBLIC_HOST:-localhost}:8000
      MLFLOW_URL: http://${PUBLIC_HOST:-localhost}:5000
      AIRFLOW_URL: http://${PUBLIC_HOST:-localhost}:8080
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Airflow (LocalExecutor + Postgres)
  # ---------------------------------------------------------------------------
  # Lancement separe : `make airflow-up` (lance d'abord postgres+init puis
  # scheduler+webserver). UI sur http://localhost:8080 (login admin/admin).
  # Profil "airflow" : ces services ne demarrent pas avec un simple `up`.

  airflow-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 10
    profiles:
      - airflow

  airflow-init:
    build: &airflow_build
      context: .
      dockerfile: docker/Dockerfile.airflow
    image: mlops-airflow
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment: &airflow_env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: "airflow-dev-secret"
      # Notre code (src/) sur le PYTHONPATH pour que les DAGs puissent
      # `from train import train`, `from data import load_data`, etc.
      PYTHONPATH: /opt/project/src
      # URI MLflow + API joignables via le reseau Docker (memes hostnames).
      MLFLOW_TRACKING_URI: http://mlflow:5000
      API_URL: http://api:8000
    user: "0:0"  # init a besoin d'ecrire dans les volumes (chown des logs)
    volumes: &airflow_volumes
      - ./dags:/opt/airflow/dags
      - ./src:/opt/project/src:ro
      - ./data:/opt/project/data:ro
      - models_data:/opt/project/models
      - airflow_logs:/opt/airflow/logs
    entrypoint: /bin/bash
    command:
      - -c
      - |
        # Donne les droits d'ecriture sur logs/ et models/ a l'utilisateur
        # airflow (UID 50000) sinon scheduler/webserver/worker echouent en
        # PermissionError (logs Airflow et model.joblib produit par le DAG train).
        chown -R 50000:0 /opt/airflow/logs /opt/project/models
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname admin --lastname admin \
          --role Admin --email admin@example.com || true
    profiles:
      - airflow

  airflow-scheduler:
    build: *airflow_build
    image: mlops-airflow
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow_env
    volumes: *airflow_volumes
    working_dir: /opt/project
    command: scheduler
    restart: unless-stopped
    profiles:
      - airflow

  airflow-webserver:
    build: *airflow_build
    image: mlops-airflow
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow_env
    volumes: *airflow_volumes
    working_dir: /opt/project
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    profiles:
      - airflow

volumes:
  mlflow_data:
  models_data:
  airflow_pg_data:
  airflow_logs:
